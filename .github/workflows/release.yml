name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'evocode-v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: false
          prerelease: false
          target: ${{ matrix.target }}

      - name: Verify macOS app signature
        if: matrix.platform == 'macos-latest'
        run: |
          APP=""
          for C in \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/evocode-tauri.app" \
            "src-tauri/target/release/bundle/macos/evocode-tauri.app" \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/evocode-tauri.app"; do
            if [ -d "$C" ]; then
              APP="$C"
              echo "Found at: $APP"
              break
            fi
          done
          if [ -z "$APP" ]; then
            echo "::error::.app not found in any expected location"
            echo "--- target tree ---"
            find src-tauri/target -maxdepth 5 -type d 2>&1 | head -40
            echo "--- any .app ---"
            find "$GITHUB_WORKSPACE" -name "*.app" -type d 2>&1
            exit 1
          fi
          codesign --verify --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E "Signature=|Identifier=|Format="