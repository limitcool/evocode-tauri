name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'evocode-v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: false
          prerelease: false

      - name: Ad-hoc sign & verify macOS app
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          APP_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
          APP_PATH="$APP_DIR/evocode-tauri.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App bundle not found at $APP_PATH"
            ls -la "$APP_DIR" 2>/dev/null || true
            exit 1
          fi
          echo "Before signing:"
          codesign -dv "$APP_PATH" 2>&1 || true
          echo "---"
          codesign --force --deep --sign - "$APP_PATH"
          echo "After signing:"
          codesign --verify --verbose=2 "$APP_PATH"
          echo "---"
          codesign -dvv "$APP_PATH" 2>&1 | head -20